version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lt_recepciones_db
    restart: always
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=lt_secret_password
      - POSTGRES_DB=lt_recepciones_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: